apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: workflow-debug-api-alerts
  labels:
    app.kubernetes.io/name: workflow-debug-api
    release: prometheus
spec:
  groups:
    - name: workflow-debug-api.availability
      rules:
        - alert: workflow-debug-apiHighErrorRate
          expr: sum(rate(http_requests_total{service="workflow-debug-api",status=~"5.."}[5m])) / sum(rate(http_requests_total{service="workflow-debug-api"}[5m])) > 0.05
          for: 10m
          labels:
            severity: warning
            team: Developer Experience
          annotations:
            summary: workflow-debug-api has elevated 5xx responses.
            runbook_url: docs/RUNBOOK.md
        - alert: workflow-debug-apiUnavailable
          expr: up{job="workflow-debug-api"} == 0
          for: 5m
          labels:
            severity: critical
            team: Developer Experience
          annotations:
            summary: workflow-debug-api is not being scraped or is unavailable.
            runbook_url: docs/RUNBOOK.md
