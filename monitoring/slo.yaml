apiVersion: sre.platform.ohanyere.io/v1alpha1
kind: ServiceLevelObjective
metadata:
  name: workflow-debug-api-availability
  labels:
    app.kubernetes.io/name: workflow-debug-api
    finops.ohanyere.io/cost-center: developer-experience
spec:
  service: workflow-debug-api
  owner: Developer Experience
  objective: 99.9
  window: 30d
  indicator:
    type: availability
    goodEvents: sum(rate(http_requests_total{service="workflow-debug-api",status!~"5.."}[5m]))
    totalEvents: sum(rate(http_requests_total{service="workflow-debug-api"}[5m]))
  alerting:
    burnRate:
      enabled: true
